# AstraOS GRUB Configuration

set timeout=3
set default=0
set gfxmode=1024x768x32

menuentry "AstraOS - Graphical Desktop" {
    set gfxpayload=keep
    multiboot /boot/astra.kernel
    boot
}

menuentry "AstraOS - Text Mode (Fallback)" {
    set gfxpayload=text
    multiboot /boot/astra.kernel
    boot
}
